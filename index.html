<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>AnimeCompanion</title>

  <style>
    :root {
      --app-height: 100dvh;
      --safe-top: env(safe-area-inset-top);
      --safe-right: env(safe-area-inset-right);
      --safe-bottom: env(safe-area-inset-bottom);
      --safe-left: env(safe-area-inset-left);
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: var(--app-height);
      overflow: hidden;
      position: fixed;
      inset: 0;
      background: #000;
      overscroll-behavior: none;
      -webkit-text-size-adjust: 100%;
      touch-action: manipulation;
    }

    #unity-container {
      position: fixed;
      left: var(--safe-left);
      right: var(--safe-right);
      top: var(--safe-top);
      bottom: var(--safe-bottom);
      width: calc(100vw - var(--safe-left) - var(--safe-right));
      height: calc(var(--app-height) - var(--safe-top) - var(--safe-bottom));
      background: #000;
      overflow: hidden;
    }

    #unity-canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
      background: #000;
      outline: none;
      touch-action: none;
    }

    input,
    textarea,
    select,
    .tmp-input,
    .unity-input,
    #unity-container input,
    #unity-container textarea,
    body input,
    body textarea {
      font-size: 16px !important;
      line-height: 20px !important;
      transform: none !important;
      zoom: 1 !important;
    }

    * {
      -webkit-tap-highlight-color: transparent;
    }

    /* LOADING SCREEN */
    #loading-screen {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.05), rgba(0,0,0,0.95) 60%),
        #000;
      opacity: 1;
      transition: opacity 0.7s ease;
      pointer-events: none;
      overflow: hidden;
    }

    #loading-screen.hidden {
      opacity: 0;
    }

    /* Blur/fade loop animasyonu için glow katmanları */
    .blur-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.18;
      mix-blend-mode: screen;
      animation: pulse 3s ease-in-out infinite;
    }

    .orb1 {
      width: 260px;
      height: 260px;
      left: 50%;
      top: 40%;
      transform: translate(-50%, -50%);
      background: rgba(255,255,255,0.9);
      animation-delay: 0s;
    }

    .orb2 {
      width: 180px;
      height: 180px;
      left: 42%;
      top: 52%;
      transform: translate(-50%, -50%);
      background: rgba(180,180,180,0.7);
      animation-delay: 0.7s;
    }

    .orb3 {
      width: 220px;
      height: 220px;
      left: 58%;
      top: 48%;
      transform: translate(-50%, -50%);
      background: rgba(220,220,220,0.6);
      animation-delay: 1.4s;
    }

    @keyframes pulse {
      0% {
        opacity: 0.10;
        filter: blur(40px);
        transform: translate(-50%, -50%) scale(0.85);
      }
      50% {
        opacity: 0.32;
        filter: blur(80px);
        transform: translate(-50%, -50%) scale(1.15);
      }
      100% {
        opacity: 0.10;
        filter: blur(40px);
        transform: translate(-50%, -50%) scale(0.85);
      }
    }

    /* Ortadaki yazı/logo alanı */
    #loading-title {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
      opacity: 0.92;
    }

    /* Alt progress alanı */
    #progress-area {
      position: absolute;
      left: 50%;
      bottom: 42px;
      transform: translateX(-50%);
      width: min(78vw, 720px);
    }

    #progress-text {
      color: rgba(255,255,255,0.85);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
      margin-bottom: 10px;
      text-align: center;
      letter-spacing: 0.06em;
    }

    #progress-track {
      width: 100%;
      height: 10px;
      background: rgba(255,255,255,0.14);
      border-radius: 999px;
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
    }

    #progress-fill {
      width: 100%;
      height: 100%;
      transform: scaleX(0);
      transform-origin: left center;
      border-radius: inherit;
      background: linear-gradient(90deg, #ffffff 0%, #bdbdbd 100%);
      transition: transform 0.15s linear;
    }

    /* Küçük cihazlar */
    @media (max-width: 600px) {
      #loading-title {
        font-size: 20px;
      }

      #progress-area {
        width: 86vw;
        bottom: 28px;
      }

      .orb1 { width: 180px; height: 180px; }
      .orb2 { width: 140px; height: 140px; }
      .orb3 { width: 160px; height: 160px; }
    }
  </style>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div id="unity-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>
  </div>

  <script>
    (function () {
      function setAppHeight() {
        var h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
        document.documentElement.style.setProperty('--app-height', h + 'px');

        var canvas = document.getElementById('unity-canvas');
        if (canvas) {
          canvas.style.width = '100%';
          canvas.style.height = '100%';
        }

        window.scrollTo(0, 0);
      }

      setAppHeight();

      window.addEventListener('resize', setAppHeight);

      window.addEventListener('orientationchange', function () {
        setTimeout(setAppHeight, 250);
        setTimeout(setAppHeight, 800);
      });

      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', function () {
          setTimeout(setAppHeight, 50);
        });

        window.visualViewport.addEventListener('scroll', function () {
          window.scrollTo(0, 0);
        });
      }

      document.addEventListener('focusout', function () {
        setTimeout(setAppHeight, 80);
        setTimeout(setAppHeight, 250);
      }, true);
    })();
  </script>

  <div id="loading-screen">
    <div class="blur-orb orb1"></div>
    <div class="blur-orb orb2"></div>
    <div class="blur-orb orb3"></div>

    <div id="loading-title">MY APP</div>

    <div id="progress-area">
      <div id="progress-text">Loading 0%</div>
      <div id="progress-track">
        <div id="progress-fill"></div>
      </div>
    </div>
  </div>

  <script src="Build/9e4a745bf3f5fabfe6ff2d84e41592f0.loader.js"></script>
  <script>
    const canvas = document.querySelector("#unity-canvas");
    const loadingScreen = document.querySelector("#loading-screen");
    const progressFill = document.querySelector("#progress-fill");
    const progressText = document.querySelector("#progress-text");

    const config = {
      dataUrl: "Build/048d460e039f3f7937620d7da5e7c114.data.br",
      frameworkUrl: "Build/5cb60bb8030382d598eb354af20fcb6d.framework.js.br",
      codeUrl: "Build/a75b2b16d9d7ec7d543a0cfde84035c3.wasm.br",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "AnimeCompanion",
      productVersion: "0.1.0",
      matchWebGLToCanvasSize: true
    };

    createUnityInstance(canvas, config, (progress) => {
      const value = Math.max(0, Math.min(1, progress));
      progressFill.style.transform = `scaleX(${value})`;
      progressText.textContent = `Loading ${Math.round(value * 100)}%`;
    }).then((unityInstance) => {
      loadingScreen.classList.add("hidden");
      setTimeout(() => {
        loadingScreen.remove();
      }, 800);

      window.unityInstance = unityInstance;
    }).catch((message) => {
      alert(message);
    });
  </script>

  <div id="google-unity-overlay"
     style="display:none; position:fixed; left:0; top:0; width:0; height:0; z-index:99999; pointer-events:none;">
  <div id="google-unity-overlay-inner"
       style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; pointer-events:auto; opacity:0.001;">
  </div>
</div>

<script>
  (function () {
    const state = {
      clientId: "",
      inited: false,
      lastWidth: 0
    };

    function sendGoogleError(code) {
      if (!window.unityInstance) return;
      window.unityInstance.SendMessage(
        "GoogleAuthController",
        "OnWebGoogleError",
        code || "auth_google_failed"
      );
    }

    function ensureRendered(widthPx) {
      const root = document.getElementById("google-unity-overlay-inner");
      if (!root) return;

      const w = Math.max(200, Math.round(widthPx || 260));
      if (Math.abs(state.lastWidth - w) < 4 && root.childElementCount > 0) return;

      root.innerHTML = "";

      if (!window.google || !google.accounts || !google.accounts.id) {
        sendGoogleError("gsi_not_ready");
        return;
      }

      google.accounts.id.renderButton(root, {
        theme: "outline",
        size: "large",
        shape: "pill",
        text: "continue_with",
        logo_alignment: "left",
        width: w
      });

      state.lastWidth = w;
    }

    window.initGoogleForUnityOverlay = function (webClientId) {
      if (!webClientId) {
        sendGoogleError("gsi_not_ready");
        return;
      }

      state.clientId = webClientId;

      if (state.inited) return;

      if (!window.google || !google.accounts || !google.accounts.id) {
        setTimeout(function () {
          window.initGoogleForUnityOverlay(webClientId);
        }, 250);
        return;
      }

      google.accounts.id.initialize({
        client_id: webClientId,
        callback: function (response) {
          if (response && response.credential) {
            if (!window.unityInstance) return;
            window.unityInstance.SendMessage(
              "GoogleAuthController",
              "OnWebGoogleIdToken",
              response.credential
            );
          } else {
            sendGoogleError("no_credential");
          }
        },
        ux_mode: "popup",
        use_fedcm_for_prompt: true,
        auto_select: false
      });

      state.inited = true;
      ensureRendered(260);
    };

    window.showGoogleUnityOverlay = function (left, top, width, height) {
      const wrap = document.getElementById("google-unity-overlay");
      if (!wrap) return;

      if (!state.inited && state.clientId) {
        window.initGoogleForUnityOverlay(state.clientId);
      }

      wrap.style.display = "block";
      wrap.style.left = Math.round(left) + "px";
      wrap.style.top = Math.round(top) + "px";
      wrap.style.width = Math.round(width) + "px";
      wrap.style.height = Math.round(height) + "px";

      ensureRendered(width);
    };

    window.hideGoogleUnityOverlay = function () {
      const wrap = document.getElementById("google-unity-overlay");
      if (wrap) wrap.style.display = "none";
    };
  })();
</script>
</body>
</html>
